<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" href="css/home.css">

    <style>
        div {
            justify-content: center;
            padding: 0cm;

<body>

<form id="form">
    <div class="blog">
        <div>
            <label for="id" class="col-sm-2 col-form-label">id:</label>
            <input type="text" class="" id="postId" placeholder="Start writing ID here..." name="id">
        </div>
        <div>
            <label for="link1080p" ,class="col-sm-2 col-form-label">1080p Link:</label>
            <input type="text" class="" id="link1080p" placeholder="Start writing 1080p Link here..." name="link1080p">
        </div>
        <div>
            <label for="link720p" ,class="col-sm-2 col-form-label">720p Link:</label>
            <input type="text" class="" id="link720p" placeholder="Start writing 720p here..." name="link720p">
        </div>

    </div>

    <div class="blog-options">
        <button type="submit" class="btn btn-success">Upload This Movie</button>
    </div>
</form>
