<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Get Movie Name and Type from URL</title>
  </head>
  <body>
    <h1>Get Movie Name and Type from URL</h1>
    <form>
      <label for="url">Enter URL:</label>
      <input type="text" id="url" name="url">
      <button type="button" onclick="getMovieNameAndType()">Get Movie Name and Type</button>
    </form>
    <p id="movieName"></p>
    <p id="movieType"></p>
<div>
    <button id="countdown-btn" onclick="startCountdown()">Verify</button>
    <p id="countdown"></p>
</div>
<div>
    <button id="continue-btn" onclick="continueBtn()" style="display: none;">Continue</button>
    <p id="countdown1"></p>
    <div id="linkDiv"></div>
    <button id="myButton">Click me!</button>

</div>

    <script>
function getMovieNameAndType() {
  const url = document.getElementById("url").value;
  const parts = url.split("&");
  const movieid = parts[0].split("?").pop();
  const movieq = parts[1];
  document.getElementById("movieName").textContent = "Movie Name: " + movieid;
  document.getElementById("movieType").textContent = "Movie Type: " + movieq;
}
// Get a reference to the button element
const button = document.getElementById('myButton');

// Listen for a click event on the button
button.addEventListener('click', () => {
  // Construct the URL for the target page based on the movie and quality parameters
  const urlParams = new URLSearchParams(window.location.search);
  // const movieName = urlParams.get('id');
  // const quality = movieType;
  const targetUrl = `https://akshayy.tk/testing/blog.html?movie=${movieid}&${movieq}`;

  // Redirect the user to the target page
  window.location.href = targetUrl;
});


</script>
  </body>
</html>
