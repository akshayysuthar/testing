<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title"></title>

    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/editor.css">
    <link rel="stylesheet" href="./css/blog.css">
    <style>
        .download-btn {
            margin-top: 5rem;
        }

        .download-btn button {
            margin-left: 10rem;
        }

        .download-btn p #linkDiv  .linkDiv{
            margin-left: 3.5rem;

        }
    </style>

</head>

<body>

    <nav class="navbar">
        <img src="./img/logo.png" class="logo" alt="">
        <ul class="links-container">
            <li class="link-item"><a href="#" class="link">home</a></li>
            <li class="link-item"><a href="#" class="link">editor</a></li>
        </ul>
    </nav>

    <div class="download-btn">
        <button id="countdown-btn" onclick="startCountdown()">Verify</button>
        <p id="countdown"></p>
    </div>


    <div class="blog" style="margin-top: 20px;">
        <h1 class="title" id="title"></h1>
        <p class="published"><span>published at - Admin</span> on 2023/03/31</p>
        <div class="article" id="article">
        </div>

    </div>

    <div class="download-btn">
        <button id="continue-btn" onclick="continueBtn2()" style="display: none;">Continue</button>
        <p id="countdown2"></p>
        <div id="linkDiv"></div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-firestore.js"></script>
    <script src="./js/firebase.js"></script>
    <script src="./js/app.js"></script>
    <script>
        const query = db.collection("blogs").limit(1)

        query.get().then((querySnapshot) => {
            querySnapshot.forEach((doc) => {
                // Do something with the blog data
                document.getElementById("article").innerHTML += `${doc.data().article}`
                document.getElementById("title").innerHTML += `${doc.data().title}`
                document.getElementById("tab-title").innerHTML += `${doc.data().title}`
            });
        }).catch((error) => {
            console.log("Error getting documents: ", error);
        });
    </script>

</body>

</html>
